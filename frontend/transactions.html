<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions - Private Wallet Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="user-layout">
  <!-- User Nav Drawer -->
  <div class="user-nav-overlay" id="user-nav-overlay"></div>
  <div class="user-nav-drawer" id="user-nav-drawer">
    <div class="user-nav-header">
      <h3>Private Wallet</h3>
      <button class="user-nav-close" id="user-nav-close">&times;</button>
    </div>
    <ul class="user-nav-menu">
      <li class="user-nav-item" data-href="dashboard.html">Dashboard</li>
      <li class="user-nav-item active" data-href="transactions.html">Transactions</li>
      <li class="user-nav-item" data-href="withdrawals.html">Withdrawals</li>
      <li class="user-nav-item" data-href="accounts.html">Accounts</li>
      <li class="user-nav-item" data-href="statistics.html">Statistics</li>
    </ul>
    <div class="user-nav-footer">
      <button class="btn btn-danger btn-block" id="logout-btn">Logout</button>
    </div>
  </div>

  <!-- Topbar -->
  <header class="user-topbar">
    <div class="user-topbar-left">
      <button class="user-topbar-menu-btn" id="user-menu-btn">&#9776;</button>
      <div class="user-topbar-title">Transactions</div>
    </div>
    <div class="user-topbar-right">
      <button class="topbar-btn">Support</button>
      <div class="topbar-pill">1 USDT &rarr; 127.65 BDT</div>
      <div class="notification-bell" id="notification-bell">
        &#128276;
        <span class="badge" id="notification-badge" style="display:none;">0</span>
        <div class="notification-dropdown" id="notification-dropdown"></div>
      </div>
      <button class="topbar-icon-btn" title="Help">?</button>
      <div class="avatar" id="user-avatar">U</div>
    </div>
  </header>

  <div class="user-page-content">
    <div id="alert-container"></div>

    <div class="filter-bar">
      <div class="form-group">
        <label>From</label>
        <input type="date" id="filter-from" class="form-control" />
      </div>
      <div class="form-group">
        <label>To</label>
        <input type="date" id="filter-to" class="form-control" />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="filter-type" class="form-control">
          <option value="">All</option>
          <option value="deposit">Deposit</option>
          <option value="withdrawal">Withdrawal</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="filter-status" class="form-control">
          <option value="">All</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <button class="btn btn-primary" id="btn-filter">Filter</button>
      <button class="btn btn-success" id="btn-export">Download CSV</button>
    </div>

    <div class="card">
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Account</th>
              <th>Number</th>
              <th>Amount</th>
              <th>Commission</th>
              <th>Income Deduct</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="transactions-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/transactions.js"></script>
</body>
</html>
