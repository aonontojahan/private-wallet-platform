<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistics - Private Wallet Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="user-layout">
  <!-- User Nav Drawer -->
  <div class="user-nav-overlay" id="user-nav-overlay"></div>
  <div class="user-nav-drawer" id="user-nav-drawer">
    <div class="user-nav-header">
      <h3>Private Wallet</h3>
      <button class="user-nav-close" id="user-nav-close">&times;</button>
    </div>
    <ul class="user-nav-menu">
      <li class="user-nav-item" data-href="dashboard.html">Dashboard</li>
      <li class="user-nav-item" data-href="transactions.html">Transactions</li>
      <li class="user-nav-item" data-href="withdrawals.html">Withdrawals</li>
      <li class="user-nav-item" data-href="accounts.html">Accounts</li>
      <li class="user-nav-item active" data-href="statistics.html">Statistics</li>
    </ul>
    <div class="user-nav-footer">
      <button class="btn btn-danger btn-block" id="logout-btn">Logout</button>
    </div>
  </div>

  <!-- Topbar -->
  <header class="user-topbar">
    <div class="user-topbar-left">
      <button class="user-topbar-menu-btn" id="user-menu-btn">&#9776;</button>
      <div class="user-topbar-title">Statistics</div>
    </div>
    <div class="user-topbar-right">
      <button class="topbar-btn">Support</button>
      <div class="topbar-pill">1 USDT &rarr; 127.65 BDT</div>
      <div class="notification-bell" id="notification-bell">
        &#128276;
        <span class="badge" id="notification-badge" style="display:none;">0</span>
        <div class="notification-dropdown" id="notification-dropdown"></div>
      </div>
      <button class="topbar-icon-btn" title="Help">?</button>
      <div class="avatar" id="user-avatar">U</div>
    </div>
  </header>

  <div class="user-page-content">
    <div id="alert-container"></div>

    <div class="filter-bar">
      <div class="form-group">
        <label>From</label>
        <input type="date" id="stat-from" class="form-control" />
      </div>
      <div class="form-group">
        <label>To</label>
        <input type="date" id="stat-to" class="form-control" />
      </div>
      <button class="btn btn-primary" id="btn-stat-filter">Apply</button>
      <button class="btn btn-success" id="btn-stat-export">Download</button>
    </div>

    <div class="grid grid-4" style="margin-bottom:1.5rem;">
      <div class="stat-card">
        <div class="value" id="st-deposits">0.00</div>
        <div class="label">Total Deposits</div>
      </div>
      <div class="stat-card">
        <div class="value" id="st-withdrawals">0.00</div>
        <div class="label">Total Withdrawals</div>
      </div>
      <div class="stat-card">
        <div class="value" id="st-pending">0</div>
        <div class="label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="value" id="st-total">0</div>
        <div class="label">Total Txns</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">Transactions by Account</div></div>
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Account Type</th>
              <th>Count</th>
              <th>Total Amount</th>
            </tr>
          </thead>
          <tbody id="stats-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/statistics.js"></script>
</body>
</html>
