<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistics - Private Wallet Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>Private Wallet</h3>
        <button class="sidebar-toggle" id="sidebar-toggle">&#9776;</button>
      </div>
      <ul class="nav-menu">
        <li class="nav-item" data-href="dashboard.html"><span>Dashboard</span></li>
        <li class="nav-item" data-href="transactions.html"><span>Transactions</span></li>
        <li class="nav-item" data-href="withdrawals.html"><span>Withdrawals</span></li>
        <li class="nav-item" data-href="accounts.html"><span>Accounts</span></li>
        <li class="nav-item active" data-href="statistics.html"><span>Statistics</span></li>
      </ul>
      <div class="sidebar-footer">
        <button class="btn btn-danger btn-block" id="logout-btn">Logout</button>
      </div>
    </aside>

    <div class="main-content" id="main-content">
      <header class="topbar">
        <div class="topbar-left"><h2>Statistics</h2></div>
        <div class="topbar-right">
          <div class="notification-bell" id="notification-bell">
            &#128276;
            <span class="badge" id="notification-badge" style="display:none;">0</span>
            <div class="notification-dropdown" id="notification-dropdown"></div>
          </div>
          <div class="user-menu"><span id="topbar-user-name">User</span></div>
        </div>
      </header>

      <div class="page-content">
        <div id="alert-container"></div>

        <div class="filter-bar">
          <div class="form-group">
            <label>From</label>
            <input type="date" id="stat-from" class="form-control" />
          </div>
          <div class="form-group">
            <label>To</label>
            <input type="date" id="stat-to" class="form-control" />
          </div>
          <button class="btn btn-primary" id="btn-stat-filter">Apply</button>
          <button class="btn btn-success" id="btn-stat-export">Download</button>
        </div>

        <div class="grid grid-4" style="margin-bottom:1.5rem;">
          <div class="stat-card">
            <div class="value" id="st-deposits">0.00</div>
            <div class="label">Total Deposits</div>
          </div>
          <div class="stat-card">
            <div class="value" id="st-withdrawals">0.00</div>
            <div class="label">Total Withdrawals</div>
          </div>
          <div class="stat-card">
            <div class="value" id="st-pending">0</div>
            <div class="label">Pending</div>
          </div>
          <div class="stat-card">
            <div class="value" id="st-total">0</div>
            <div class="label">Total Txns</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><div class="card-title">Transactions by Account</div></div>
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Account Type</th>
                  <th>Count</th>
                  <th>Total Amount</th>
                </tr>
              </thead>
              <tbody id="stats-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/statistics.js"></script>
</body>
</html>
