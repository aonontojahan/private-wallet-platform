<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdrawals - Private Wallet Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>Private Wallet</h3>
        <button class="sidebar-toggle" id="sidebar-toggle">&#9776;</button>
      </div>
      <ul class="nav-menu">
        <li class="nav-item" data-href="dashboard.html"><span>Dashboard</span></li>
        <li class="nav-item" data-href="transactions.html"><span>Transactions</span></li>
        <li class="nav-item active" data-href="withdrawals.html"><span>Withdrawals</span></li>
        <li class="nav-item" data-href="accounts.html"><span>Accounts</span></li>
        <li class="nav-item" data-href="statistics.html"><span>Statistics</span></li>
      </ul>
      <div class="sidebar-footer">
        <button class="btn btn-danger btn-block" id="logout-btn">Logout</button>
      </div>
    </aside>

    <div class="main-content" id="main-content">
      <header class="topbar">
        <div class="topbar-left"><h2>Withdrawals</h2></div>
        <div class="topbar-right">
          <div class="notification-bell" id="notification-bell">
            &#128276;
            <span class="badge" id="notification-badge" style="display:none;">0</span>
            <div class="notification-dropdown" id="notification-dropdown"></div>
          </div>
          <div class="user-menu"><span id="topbar-user-name">User</span></div>
        </div>
      </header>

      <div class="page-content">
        <div id="alert-container"></div>

        <div class="grid grid-2" style="margin-bottom:1.5rem;">
          <div class="balance-card">
            <div class="label">Trust Balance</div>
            <div class="amount" id="trust-balance">0.00</div>
          </div>
          <div class="balance-card">
            <div class="label">Income Balance</div>
            <div class="amount" id="income-balance">0.00</div>
          </div>
        </div>

        <div style="margin-bottom:1.5rem;">
          <button class="btn btn-primary" id="btn-new-withdrawal">New Withdrawal</button>
        </div>

        <div class="card">
          <div class="card-header"><div class="card-title">Withdrawal History</div></div>
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Amount</th>
                  <th>Account</th>
                  <th>Number</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="withdrawals-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="withdrawal-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Request Withdrawal</div>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="withdrawal-form">
        <div class="form-group">
          <label>Amount</label>
          <input type="number" step="0.01" id="w-amount" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <select id="w-account-type" class="form-control">
            <option value="bkash">bKash</option>
            <option value="nagad">Nagad</option>
            <option value="bank">Bank</option>
          </select>
        </div>
        <div class="form-group">
          <label>Account Number</label>
          <input type="text" id="w-account-number" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Submit Request</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/withdrawals.js"></script>
</body>
</html>
