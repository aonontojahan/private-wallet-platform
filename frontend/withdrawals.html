<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdrawals - Private Wallet Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="user-layout">
  <!-- User Nav Drawer -->
  <div class="user-nav-overlay" id="user-nav-overlay"></div>
  <div class="user-nav-drawer" id="user-nav-drawer">
    <div class="user-nav-header">
      <h3>Private Wallet</h3>
      <button class="user-nav-close" id="user-nav-close">&times;</button>
    </div>
    <ul class="user-nav-menu">
      <li class="user-nav-item" data-href="dashboard.html">Dashboard</li>
      <li class="user-nav-item" data-href="transactions.html">Transactions</li>
      <li class="user-nav-item active" data-href="withdrawals.html">Withdrawals</li>
      <li class="user-nav-item" data-href="accounts.html">Accounts</li>
      <li class="user-nav-item" data-href="statistics.html">Statistics</li>
    </ul>
    <div class="user-nav-footer">
      <button class="btn btn-danger btn-block" id="logout-btn">Logout</button>
    </div>
  </div>

  <!-- Topbar -->
  <header class="user-topbar">
    <div class="user-topbar-left">
      <button class="user-topbar-menu-btn" id="user-menu-btn">&#9776;</button>
      <div class="user-topbar-title">Withdrawals</div>
    </div>
    <div class="user-topbar-right">
      <button class="topbar-btn">Support</button>
      <div class="topbar-pill">1 USDT &rarr; 127.65 BDT</div>
      <div class="notification-bell" id="notification-bell">
        &#128276;
        <span class="badge" id="notification-badge" style="display:none;">0</span>
        <div class="notification-dropdown" id="notification-dropdown"></div>
      </div>
      <button class="topbar-icon-btn" title="Help">?</button>
      <div class="avatar" id="user-avatar">U</div>
    </div>
  </header>

  <div class="user-page-content">
    <div id="alert-container"></div>

    <div class="user-balance-grid">
      <div class="user-balance-card">
        <div class="balance-card-header">
          <div class="balance-card-title-group">
            <div class="balance-card-icon">&#8962;</div>
            <div class="balance-card-title">Trust balance</div>
          </div>
        </div>
        <div class="balance-amount" id="trust-balance">0.00 <span style="font-size:1rem; color:var(--text-muted);">BDT</span></div>
      </div>
      <div class="user-balance-card">
        <div class="balance-card-header">
          <div class="balance-card-title-group">
            <div class="balance-card-icon">&#128200;</div>
            <div class="balance-card-title">Income balance</div>
          </div>
        </div>
        <div class="balance-amount" id="income-balance">0.00 <span style="font-size:1rem; color:var(--text-muted);">BDT</span></div>
      </div>
    </div>

    <div style="margin-bottom:1.5rem;">
      <button class="btn btn-primary" id="btn-new-withdrawal">New Withdrawal</button>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">Withdrawal History</div></div>
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Amount</th>
              <th>Account</th>
              <th>Number</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="withdrawals-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="withdrawal-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Request Withdrawal</div>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="withdrawal-form">
        <div class="form-group">
          <label>Amount</label>
          <input type="number" step="0.01" id="w-amount" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <select id="w-account-type" class="form-control">
            <option value="bkash">bKash</option>
            <option value="nagad">Nagad</option>
            <option value="bank">Bank</option>
          </select>
        </div>
        <div class="form-group">
          <label>Account Number</label>
          <input type="text" id="w-account-number" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Submit Request</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/withdrawals.js"></script>
</body>
</html>
