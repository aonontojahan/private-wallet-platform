<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounts - Private Wallet Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>Private Wallet</h3>
        <button class="sidebar-toggle" id="sidebar-toggle">&#9776;</button>
      </div>
      <ul class="nav-menu">
        <li class="nav-item" data-href="dashboard.html"><span>Dashboard</span></li>
        <li class="nav-item" data-href="transactions.html"><span>Transactions</span></li>
        <li class="nav-item" data-href="withdrawals.html"><span>Withdrawals</span></li>
        <li class="nav-item active" data-href="accounts.html"><span>Accounts</span></li>
        <li class="nav-item" data-href="statistics.html"><span>Statistics</span></li>
      </ul>
      <div class="sidebar-footer">
        <button class="btn btn-danger btn-block" id="logout-btn">Logout</button>
      </div>
    </aside>

    <div class="main-content" id="main-content">
      <header class="topbar">
        <div class="topbar-left"><h2>Accounts</h2></div>
        <div class="topbar-right">
          <div class="notification-bell" id="notification-bell">
            &#128276;
            <span class="badge" id="notification-badge" style="display:none;">0</span>
            <div class="notification-dropdown" id="notification-dropdown"></div>
          </div>
          <div class="user-menu"><span id="topbar-user-name">User</span></div>
        </div>
      </header>

      <div class="page-content">
        <div id="alert-container"></div>

        <div id="admin-section" style="display:none;">
          <div style="margin-bottom:1rem;">
            <button class="btn btn-success" id="btn-create-user">Create User</button>
          </div>
          <div class="card">
            <div class="table-container">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Admin</th>
                    <th>Active</th>
                    <th>Created</th>
                  </tr>
                </thead>
                <tbody id="users-body"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="user-section">
          <div class="card" style="max-width:480px;">
            <div class="card-header"><div class="card-title">Change Password</div></div>
            <form id="change-password-form">
              <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="cp-current" class="form-control" required />
              </div>
              <div class="form-group">
                <label>New Password</label>
                <input type="password" id="cp-new" class="form-control" required />
              </div>
              <button type="submit" class="btn btn-primary">Update Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="create-user-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Create New User</div>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="create-user-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="cu-name" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="cu-email" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="cu-password" class="form-control" required />
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="cu-admin" /> Admin
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create User</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/accounts.js"></script>
</body>
</html>
