<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounts - Private Wallet Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="user-layout">
  <!-- User Nav Drawer -->
  <div class="user-nav-overlay" id="user-nav-overlay"></div>
  <div class="user-nav-drawer" id="user-nav-drawer">
    <div class="user-nav-header">
      <h3>Private Wallet</h3>
      <button class="user-nav-close" id="user-nav-close">&times;</button>
    </div>
    <ul class="user-nav-menu">
      <li class="user-nav-item" data-href="dashboard.html">Dashboard</li>
      <li class="user-nav-item" data-href="transactions.html">Transactions</li>
      <li class="user-nav-item" data-href="withdrawals.html">Withdrawals</li>
      <li class="user-nav-item active" data-href="accounts.html">Accounts</li>
      <li class="user-nav-item" data-href="statistics.html">Statistics</li>
    </ul>
    <div class="user-nav-footer">
      <button class="btn btn-danger btn-block" id="logout-btn">Logout</button>
    </div>
  </div>

  <!-- Topbar -->
  <header class="user-topbar">
    <div class="user-topbar-left">
      <button class="user-topbar-menu-btn" id="user-menu-btn">&#9776;</button>
      <div class="user-topbar-title">Accounts</div>
    </div>
    <div class="user-topbar-right">
      <a href="mailto:shakibalarman.cse@gmail.com?subject=Support%20Request" class="topbar-btn">Support</a>
      <div class="topbar-pill" id="exchange-pill">
        <span id="exchange-rate-text">1 USDT &rarr; 127.65 BDT</span>
        <button class="swap-btn" id="swap-rate-btn">&#8644;</button>
      </div>
      <div class="notification-bell" id="notification-bell">
        &#128276;
        <span class="badge" id="notification-badge" style="display:none;">0</span>
        <div class="notification-dropdown" id="notification-dropdown">
          <div class="notification-dropdown-header">
            <span>Notifications</span>
            <a href="#" onclick="event.preventDefault();">Mark all as read</a>
          </div>
          <div class="notification-dropdown-body" id="notification-dropdown-body"></div>
        </div>
      </div>
      <button class="topbar-icon-btn" id="help-btn" title="Help">?</button>
      <div class="avatar-wrap">
        <div class="avatar" id="user-avatar">U</div>
        <div class="avatar-dropdown" id="avatar-dropdown">
          <div class="avatar-dropdown-header">
            <div class="avatar-large" id="dropdown-avatar-large">U</div>
            <div>
              <div class="user-name" id="dropdown-user-name">User</div>
              <div class="user-email" id="dropdown-user-email">user@example.com</div>
            </div>
          </div>
          <button class="avatar-dropdown-btn">Connect two-factor authentication</button>
          <button class="avatar-dropdown-btn">Check your manager</button>
          <div class="avatar-dropdown-divider"></div>
          <button class="avatar-dropdown-item" onclick="logout()">
            <span>&#128682;</span> Logout
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="user-page-content">
    <div id="alert-container"></div>

    <div id="admin-section" style="display:none;">
      <div style="margin-bottom:1rem;">
        <button class="btn btn-success" id="btn-create-user">Create User</button>
      </div>
      <div class="card">
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Admin</th>
                <th>Active</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="user-section">
      <div class="card" style="max-width:480px;">
        <div class="card-header"><div class="card-title">Change Password</div></div>
        <form id="change-password-form">
          <div class="form-group">
            <label>Current Password</label>
            <input type="password" id="cp-current" class="form-control" required />
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="cp-new" class="form-control" required />
          </div>
          <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="create-user-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Create New User</div>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="create-user-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="cu-name" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="cu-email" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="cu-password" class="form-control" required />
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="cu-admin" /> Admin
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create User</button>
      </form>
    </div>
  </div>

  <!-- FAQ Modal -->
  <div class="faq-modal-overlay" id="faq-modal">
    <div class="faq-modal">
      <div class="faq-modal-header">
        <h2>Frequently Asked Questions</h2>
        <button class="modal-close" id="faq-modal-close">&times;</button>
      </div>
      <div class="faq-search">
        <input type="text" placeholder="Search for a question" id="faq-search" />
      </div>
      <div class="faq-tabs">
        <button class="faq-tab active" data-category="all">All</button>
        <button class="faq-tab" data-category="access">Access & Authorization</button>
        <button class="faq-tab" data-category="balances">Balances & Funds</button>
        <button class="faq-tab" data-category="transactions">Transactions & Operations</button>
        <button class="faq-tab" data-category="accounts">Accounts & Verification</button>
        <button class="faq-tab" data-category="security">Interface & Security</button>
      </div>
      <div class="faq-list" id="faq-list"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/accounts.js"></script>
</body>
</html>
